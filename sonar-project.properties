sonar.projectKey=georgiosnikitas_moodito
sonar.organization=georgiosnikitas

# Analyze the source at the repo root; keep build artifacts and the venv out.
sonar.sources=.
sonar.tests=tests
sonar.exclusions=build/**,dist/**,.venv/**,**/*.task,**/*.icns,**/*.png

# Dev-only scripts have no automated tests; don't dilute coverage with them.
sonar.coverage.exclusions=make_icon.py,make_qr.py,tests/**

# Python versions the code targets (MediaPipe wheels: 3.10–3.12).
sonar.python.version=3.10,3.11,3.12

# Coverage report produced by pytest-cov in CI (path relative to repo root).
sonar.python.coverage.reportPaths=coverage.xml
