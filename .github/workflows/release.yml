name: Release

# Continuous Delivery: triggered when a version tag is pushed (e.g. v1.0.0).
# Builds the macOS .app, zips it, and publishes a GitHub Release with the
# artifact attached. The PyInstaller build itself acts as the CI gate.
on:
  push:
    tags:
      - "v*"

jobs:
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml
    secrets: inherit # pass SONAR_TOKEN through to the reusable workflow

  release:
    name: Build & publish Moodito.app
    needs: ci
    runs-on: macos-latest
    permissions:
      contents: write # required to create a GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          python -m pip install --only-binary :all: pip==26.1.2
          pip install --require-hashes --only-binary :all: --no-binary rumps -r requirements.txt
          pip install --only-binary :all: pyinstaller==6.21.0

      - name: Build standalone .app
        env:
          MOODITO_VERSION: ${{ steps.version.outputs.version }}
        run: python -m PyInstaller --noconfirm --clean moodito.spec

      - name: Package .app into a zip
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "Moodito.app" "Moodito-${{ github.ref_name }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: Moodito ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/Moodito-${{ github.ref_name }}.zip

  homebrew:
    name: Update Homebrew tap
    needs: release
    runs-on: macos-latest
    permissions:
      contents: read # required for the GitHub CLI to download the release asset

    steps:
      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "Moodito-${{ github.ref_name }}.zip"

      - name: Compute SHA-256
        id: sha
        run: echo "sha256=$(shasum -a 256 "Moodito-${{ github.ref_name }}.zip" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: georgiosnikitas/homebrew-moodito
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update cask
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          mkdir -p tap/Casks
          cat > tap/Casks/moodito.rb <<EOF
          cask "moodito" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/${{ github.repository }}/releases/download/v#{version}/Moodito-v#{version}.zip"
            name "Moodito"
            desc "Privacy-first macOS menu bar app that reads your mood from the webcam"
            homepage "https://github.com/${{ github.repository }}"

            depends_on macos: ">= :big_sur"

            app "Moodito.app"

            zap trash: [
              "~/Library/Application Support/Moodito",
              "~/Library/Preferences/com.moodito.app.plist",
            ]
          end
          EOF

      - name: Commit and push
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/moodito.rb
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "moodito ${{ steps.version.outputs.version }}"
            git push
          fi
