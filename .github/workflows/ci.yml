name: CI

# Continuous Integration: validate the code on every push and pull request,
# and also reusable by the Release workflow (workflow_call) as a pre-release gate.
# Runs on macOS because Moodito depends on pyobjc/AVFoundation/rumps and is a
# macOS menu-bar app.
on:
  push:
    branches: ["**"]
    tags-ignore: ["**"] # tag pushes are handled by release.yml
  pull_request:
    branches: ["**"]
  workflow_call: # allows release.yml to run CI before publishing

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, test & build (Python ${{ matrix.python-version }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --only-binary :all: --upgrade pip
          pip install --only-binary :all: -r requirements.txt pyinstaller
          pip install --only-binary :all: ruff pytest

      - name: Lint (ruff)
        run: ruff check .

      - name: Syntax / import check
        run: |
          python -m compileall -q app.py emotion.py make_icon.py
          python -c "import app, emotion"

      - name: Unit tests (pytest)
        run: |
          # Exit code 5 = "no tests collected"; treat as success until tests exist.
          python -m pytest --maxfail=1 -q || [ $? -eq 5 ]

      - name: Build standalone .app (smoke test)
        run: python -m PyInstaller --noconfirm --clean moodito.spec

      - name: Verify bundle exists
        run: test -d "dist/Moodito.app"

  sonarcloud:
    name: SonarCloud analysis
    runs-on: macos-latest
    # Skip on PRs from forks, where SONAR_TOKEN is not available.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for accurate blame / new-code detection

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --only-binary :all: --upgrade pip
          pip install --only-binary :all: -r requirements.txt
          pip install --only-binary :all: pytest pytest-cov

      - name: Tests with coverage
        run: |
          # Generate coverage.xml for Sonar; tolerate "no tests collected" (exit 5).
          python -m pytest --cov=app --cov=emotion --cov-report=xml -q || [ $? -eq 5 ]

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703 # v5.3.2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

